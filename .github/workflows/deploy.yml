name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Inyectar el secret de Gemini en appsettings.json ANTES del build ──
      # El secret GEMINI_API_KEY se define en:
      #   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
      - name: Inject Gemini API key into appsettings.json
        run: |
          echo '{"GeminiApiKey":"${{ secrets.GEMINI_API_KEY }}"}' \
            > AppFitness.Wasm/wwwroot/appsettings.json

      - name: Restore dependencies
        run: dotnet restore AppFitness.Wasm/AppFitness.Wasm.csproj

      - name: Publish WASM
        run: |
          dotnet publish AppFitness.Wasm/AppFitness.Wasm.csproj \
            -c Release \
            -o publish

      # ── Ajustar base href para GitHub Pages (/App-Fitness/) ──
      - name: Fix base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/App-Fitness/" />|g' \
            publish/wwwroot/index.html

      # ── El service worker y el 404 ya tienen la ruta correcta ──
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

