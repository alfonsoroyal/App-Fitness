name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── Inyectar las API keys de Gemini en appsettings.json ──────────────
      # En GitHub: Settings → Secrets and variables → Actions → New repository secret
      # Nombre del secret: GEMINI_API_KEYS
      # Valor: varias keys separadas por coma, ej: AIzaSy...key1,AIzaSy...key2,AIzaSy...key3
      - name: Inject Gemini API keys into appsettings.json
        run: |
          KEYS="${{ secrets.GEMINI_API_KEYS }}"
          # Convierte "key1,key2,key3" → ["key1","key2","key3"]
          JSON_ARRAY=$(echo "$KEYS" | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          keys = [k.strip() for k in raw.split(',') if k.strip()]
          print(json.dumps(keys))
          ")
          echo "{\"GeminiApiKeys\": $JSON_ARRAY}" > AppFitness.Wasm/wwwroot/appsettings.json
          echo "appsettings.json generado:"
          cat AppFitness.Wasm/wwwroot/appsettings.json

      - name: Restore dependencies
        run: dotnet restore AppFitness.Wasm/AppFitness.Wasm.csproj

      - name: Publish WASM
        run: |
          dotnet publish AppFitness.Wasm/AppFitness.Wasm.csproj \
            -c Release \
            -o publish

      # ── Ajustar base href para GitHub Pages (/App-Fitness/) ──────────────
      - name: Fix base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/App-Fitness/" />|g' \
            publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

